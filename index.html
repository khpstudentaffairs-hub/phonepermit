<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบฟอร์มขออนุญาตนำโทรศัพท์มาโรงเรียน | โรงเรียนคลองหาดพิทยาคม</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

  :root {
    --purple-dark: #4a1b7a;
    --purple-main: #6b2fa0;
    --purple-mid: #8b4fc8;
    --purple-light: #c9a8e8;
    --purple-pale: #f3eafa;
    --purple-bg: #faf5ff;
    --white: #ffffff;
    --gray-100: #f8f8f8;
    --gray-200: #eeeeee;
    --gray-400: #aaaaaa;
    --gray-700: #444444;
    --text: #1a1a2e;
    --success: #1b7a4a;
    --success-bg: #eafaf1;
    --error: #a01b1b;
    --error-bg: #faeaea;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--purple-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== BANNER ===== */
  .banner {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple-main) 60%, var(--purple-mid) 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .banner-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .school-logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);
    object-fit: cover;
    background: #000;
  }
  .banner-text h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .banner-text .subtitle {
    color: var(--purple-light);
    font-size: 14px;
    font-weight: 400;
  }
  .banner-text .form-title {
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    font-weight: 500;
    margin-top: 6px;
    padding: 5px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    display: inline-block;
  }

  /* ===== TABS ===== */
  .tabs-wrap {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    max-width: 800px;
    margin: 0 auto;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    background: transparent;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-400);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .2s;
  }
  .tab-btn.active {
    color: var(--purple-main);
    border-bottom-color: var(--purple-main);
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--purple-light);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--purple-dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 18px;
    background: var(--purple-main);
    border-radius: 2px;
  }

  /* ===== FORM ===== */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--purple-dark);
    margin-bottom: 5px;
  }
  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 10px 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    border: 1.5px solid var(--purple-light);
    border-radius: 10px;
    background: var(--white);
    color: var(--text);
    transition: border-color .2s;
    outline: none;
  }
  .field input:focus,
  .field textarea:focus {
    border-color: var(--purple-main);
    box-shadow: 0 0 0 3px rgba(107,47,160,0.1);
  }
  .field textarea { min-height: 72px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .time-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .time-wrap input { flex: 1; }
  .time-wrap span {
    font-size: 13px;
    color: var(--gray-400);
    white-space: nowrap;
  }

  /* ===== STUDENTS ===== */
  .student-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .student-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--purple-pale);
    color: var(--purple-main);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .student-row input { flex: 1; }
  .btn-remove {
    padding: 7px 10px;
    border: 1px solid var(--purple-light);
    border-radius: 8px;
    background: transparent;
    color: var(--gray-400);
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
    transition: all .15s;
  }
  .btn-remove:hover { background: var(--error-bg); color: var(--error); border-color: #f5c1c1; }
  .btn-add-student {
    width: 100%;
    padding: 9px;
    border: 1.5px dashed var(--purple-light);
    border-radius: 10px;
    background: var(--purple-pale);
    color: var(--purple-main);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    transition: all .15s;
  }
  .btn-add-student:hover { background: #e9d8f8; }

  /* ===== SUBMIT ===== */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--purple-main), var(--purple-mid));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s, transform .1s;
    letter-spacing: 0.3px;
  }
  .btn-submit:hover { opacity: .9; }
  .btn-submit:active { transform: scale(.98); }
  .btn-submit:disabled { opacity: .6; cursor: default; }

  /* ===== MSG ===== */
  .msg {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 14px;
    display: none;
  }
  .msg.success { background: var(--success-bg); color: var(--success); }
  .msg.error { background: var(--error-bg); color: var(--error); }

  /* ===== RECORDS TAB ===== */
  .filter-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 16px;
  }
  .filter-row select {
    padding: 9px 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    border: 1.5px solid var(--purple-light);
    border-radius: 10px;
    background: var(--white);
    color: var(--text);
    outline: none;
  }
  .btn-load {
    padding: 9px 18px;
    border: 1.5px solid var(--purple-light);
    border-radius: 10px;
    background: var(--white);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--purple-main);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-load:hover { background: var(--purple-pale); }
  .btn-print {
    padding: 9px 18px;
    border: none;
    border-radius: 10px;
    background: var(--purple-main);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-print:hover { opacity: .85; }

  /* ===== RECORD CARDS ===== */
  .rec-card {
    background: var(--white);
    border: 1px solid var(--purple-light);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .rec-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .rec-teacher {
    font-size: 15px;
    font-weight: 600;
    color: var(--purple-dark);
  }
  .rec-date-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--purple-pale);
    color: var(--purple-main);
    font-weight: 500;
    white-space: nowrap;
  }
  .rec-purpose {
    font-size: 13px;
    color: var(--gray-700);
    margin-bottom: 8px;
  }
  .rec-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--gray-100);
    color: var(--gray-700);
    border: 1px solid var(--gray-200);
  }
  .rec-students {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.6;
    padding-top: 8px;
    border-top: 1px solid var(--gray-200);
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-400);
    font-size: 14px;
  }
  .loading-state {
    text-align: center;
    padding: 30px;
    color: var(--purple-mid);
    font-size: 14px;
  }

  /* ===== PRINT ===== */
  #printArea { display: none; }

  @media print {
    body > *:not(#printArea) { display: none !important; }
    #printArea { display: block !important; }

    @page { size: A4; margin: 15mm 12mm; }

    .print-page { font-family: 'Sarabun', sans-serif; }

    .print-header {
      text-align: center;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 2px solid #4a1b7a;
    }
    .print-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 10px;
    }
    .print-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }
    .print-school-name {
      font-size: 18px;
      font-weight: 700;
      color: #4a1b7a;
    }
    .print-dept {
      font-size: 13px;
      color: #6b2fa0;
    }
    .print-doc-title {
      font-size: 15px;
      font-weight: 700;
      margin-top: 8px;
      color: #1a1a2e;
    }
    .print-sub {
      font-size: 13px;
      color: #555;
      margin-top: 3px;
    }

    .print-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 4px;
    }
    .print-table th {
      background: #4a1b7a;
      color: #fff;
      padding: 8px 7px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #4a1b7a;
    }
    .print-table td {
      padding: 7px 7px;
      border: 1px solid #ccc;
      vertical-align: top;
      color: #1a1a2e;
      line-height: 1.5;
    }
    .print-table tr:nth-child(even) td { background: #faf5ff; }

    .print-footer {
      margin-top: 16px;
      font-size: 11px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    .print-sign-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 30px;
    }
    .sign-box {
      text-align: center;
      font-size: 12px;
      color: #333;
    }
    .sign-line {
      width: 180px;
      border-bottom: 1px solid #333;
      margin-bottom: 4px;
      height: 36px;
    }
  }
</style>
</head>
<body>

<!-- BANNER -->
<div class="banner">
  <div class="banner-inner">
    <img class="school-logo" id="logoImg" src="" alt="ตราโรงเรียนคลองหาดพิทยาคม">
    <div class="banner-text">
      <h1>โรงเรียนคลองหาดพิทยาคม</h1>
      <div class="subtitle">Student Affairs · งานระบบดูแลช่วยเหลือนักเรียนและความปลอดภัยในโรงเรียน</div>
      <div class="form-title">📱 แบบฟอร์มขออนุญาตนำโทรศัพท์มาโรงเรียน</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <button class="tab-btn active" onclick="showTab('form')">📝 กรอกแบบฟอร์ม</button>
  <button class="tab-btn" onclick="showTab('records')">📋 ดูข้อมูล / ปริ้น</button>
</div>

<div class="main">

  <!-- FORM TAB -->
  <div id="tabForm">
    <div class="msg" id="formMsg"></div>

    <div class="card">
      <div class="card-title">ข้อมูลการขออนุญาต</div>

      <div class="field">
        <label>ชื่อครูที่ปรึกษา / ครูผู้ดูแลกิจกรรม</label>
        <input type="text" id="teacher" placeholder="เช่น ครูสมศรี ใจดี">
      </div>

      <div class="field">
        <label>วัตถุประสงค์การใช้งาน</label>
        <textarea id="purpose" placeholder="เช่น ค้นคว้าข้อมูลประกอบการเรียน / ทำกิจกรรมในชั้นเรียน"></textarea>
      </div>

      <div class="row2">
        <div class="field">
          <label>วันที่ขออนุญาต</label>
          <input type="date" id="reqDate">
        </div>
        <div class="field">
          <label>ช่วงวันที่ขอใช้งาน</label>
          <div class="time-wrap">
            <input type="text" id="timeStart" placeholder="เช่น 26/05/2568">
            <span>ถึง</span>
            <input type="text" id="timeEnd" placeholder="เช่น 30/05/2568">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">รายชื่อนักเรียน</div>
      <div id="studentList"></div>
      <button class="btn-add-student" onclick="addStudent()">+ เพิ่มนักเรียน</button>
    </div>

    <button class="btn-submit" onclick="submitForm()" id="btnSubmit">
      ✉️ ส่งแบบฟอร์ม
    </button>
  </div>

  <!-- RECORDS TAB -->
  <div id="tabRecords" style="display:none">
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">เลือกช่วงเวลา</div>
      <div class="filter-row">
        <select id="filterMonth">
          <option value="">-- เดือน --</option>
          <option value="01">มกราคม</option>
          <option value="02">กุมภาพันธ์</option>
          <option value="03">มีนาคม</option>
          <option value="04">เมษายน</option>
          <option value="05">พฤษภาคม</option>
          <option value="06">มิถุนายน</option>
          <option value="07">กรกฎาคม</option>
          <option value="08">สิงหาคม</option>
          <option value="09">กันยายน</option>
          <option value="10">ตุลาคม</option>
          <option value="11">พฤศจิกายน</option>
          <option value="12">ธันวาคม</option>
        </select>
        <select id="filterYear">
          <option value="2568">2568</option>
          <option value="2567">2567</option>
          <option value="2569">2569</option>
          <option value="2570">2570</option>
        </select>
        <button class="btn-load" onclick="loadRecords()">🔄 โหลดข้อมูล</button>
        <button class="btn-print" onclick="doPrint()">🖨️ ปริ้นสรุปเดือนนี้</button>
      </div>
    </div>
    <div id="recordsArea">
      <div class="empty-state">เลือกเดือนและกด "โหลดข้อมูล" เพื่อดูรายการ</div>
    </div>
  </div>
</div>

<!-- PRINT AREA -->
<div id="printArea"></div>

// ===== TABS =====
function showTab(t) {
  document.getElementById('tabForm').style.display = t === 'form' ? 'block' : 'none';
  document.getElementById('tabRecords').style.display = t === 'records' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (t === 'form' && i === 0) || (t === 'records' && i === 1));
  });
}

// ===== STUDENTS =====
let sc = 0;
function addStudent() {
  sc++;
  const n = sc;
  const div = document.createElement('div');
  div.className = 'student-row';
  div.id = 'sr' + n;
  div.innerHTML = `<div class="student-num">${n}</div><input type="text" placeholder="ชื่อ-นามสกุล นักเรียน"><button class="btn-remove" onclick="removeStudent('sr${n}', this)">✕</button>`;
  document.getElementById('studentList').appendChild(div);
}
function removeStudent(id) {
  document.getElementById(id)?.remove();
  // Renumber
  document.querySelectorAll('#studentList .student-num').forEach((el, i) => el.textContent = i + 1);
}

window.addEventListener('load', () => {
  addStudent();
  const today = new Date();
  document.getElementById('reqDate').value = today.toISOString().split('T')[0];
  document.getElementById('filterMonth').value = String(today.getMonth() + 1).padStart(2, '0');
  document.getElementById('filterYear').value = (today.getFullYear() + 543).toString();
});

// ===== SUBMIT =====
async function submitForm() {
  const teacher = document.getElementById('teacher').value.trim();
  const purpose = document.getElementById('purpose').value.trim();
  const date = document.getElementById('reqDate').value;
  const timeStart = document.getElementById('timeStart').value;
  const timeEnd = document.getElementById('timeEnd').value;
  const rows = document.querySelectorAll('#studentList .student-row input');
  const students = Array.from(rows).map(r => r.value.trim()).filter(Boolean).join(', ');

  if (!teacher || !purpose || !date || !timeStart || !timeEnd || !students) {
    showMsg('กรุณากรอกข้อมูลให้ครบทุกช่อง', 'error'); return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';
  hideMsg();

  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ teacher, purpose, date, timeStart, timeEnd, students }),
      headers: { 'Content-Type': 'application/json' }
    });
    showMsg('✅ ส่งข้อมูลสำเร็จแล้ว ข้อมูลถูกบันทึกลง Google Sheet เรียบร้อย', 'success');
    document.getElementById('teacher').value = '';
    document.getElementById('purpose').value = '';
    document.getElementById('timeStart').value = '';
    document.getElementById('timeEnd').value = '';
    document.getElementById('studentList').innerHTML = '';
    sc = 0; addStudent();
  } catch (e) {
    showMsg('❌ เกิดข้อผิดพลาด กรุณาตรวจสอบการเชื่อมต่อและลองใหม่', 'error');
  }
  btn.disabled = false;
  btn.textContent = '✉️ ส่งแบบฟอร์ม';
}

function showMsg(text, type) {
  const el = document.getElementById('formMsg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('formMsg').style.display = 'none';
}

// ===== LOAD RECORDS =====
async function loadRecords() {
  const month = document.getElementById('filterMonth').value;
  const yearBE = document.getElementById('filterYear').value;
  if (!month) { alert('กรุณาเลือกเดือน'); return; }
  const yearCE = parseInt(yearBE) - 543;

  document.getElementById('recordsArea').innerHTML = '<div class="loading-state">⏳ กำลังโหลดข้อมูล...</div>';
  try {
    const res = await fetch(API + '?t=' + Date.now());
    const json = await res.json();
    const all = json.data || [];
    const filtered = all.filter(r => {
      if (!r.date) return false;
      const d = new Date(r.date);
      return d.getMonth() + 1 === parseInt(month) && d.getFullYear() === yearCE;
    });
    renderRecords(filtered, month, yearBE);
  } catch (e) {
    document.getElementById('recordsArea').innerHTML = '<div class="empty-state">❌ โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</div>';
  }
}

function formatDate(str) {
  if (!str) return '-';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return `${d.getDate()} ${MONTHS[d.getMonth() + 1]} ${d.getFullYear() + 543}`;
}

function renderRecords(data, month, yearBE) {
  const area = document.getElementById('recordsArea');
  if (!data.length) {
    area.innerHTML = '<div class="empty-state">ไม่พบข้อมูลในเดือนนี้</div>';
    buildPrint([], month, yearBE); return;
  }
  let html = '';
  data.forEach(r => {
    const studs = r.students || '-';
    const cnt = studs.split(',').filter(Boolean).length;
    html += `<div class="rec-card">
      <div class="rec-top">
        <div class="rec-teacher">👨‍🏫 ${r.teacher || '-'}</div>
        <div class="rec-date-badge">${formatDate(r.date)}</div>
      </div>
      <div class="rec-purpose">${r.purpose || '-'}</div>
      <div class="rec-badges">
        <span class="badge">📅 ${formatDate(r.timeStart)} – ${formatDate(r.timeEnd)}</span>
        <span class="badge">👥 ${cnt} คน</span>
      </div>
      <div class="rec-students">${studs}</div>
    </div>`;
  });
  area.innerHTML = html;
  buildPrint(data, month, yearBE);
}

let printReady = false;
function buildPrint(data, month, yearBE) {
  const mName = MONTHS[parseInt(month)];
  let rows = '';
  data.forEach((r, i) => {
    const studs = (r.students || '').split(',').map(s => s.trim()).filter(Boolean);
    rows += `<tr>
      <td style="text-align:center">${i + 1}</td>
      <td>${formatDate(r.date)}</td>
      <td>${r.teacher || '-'}</td>
      <td>${r.purpose || '-'}</td>
      <td>${formatDate(r.timeStart)} – ${formatDate(r.timeEnd)}</td>
      <td>${studs.join('<br>')}</td>
    </tr>`;
  });

  document.getElementById('printArea').innerHTML = `
    <div class="print-page">
      <div class="print-header">
        <div class="print-logo-row">
          <img class="print-logo" src="${LOGO_B64}" alt="ตราโรงเรียน">
          <div>
            <div class="print-school-name">โรงเรียนคลองหาดพิทยาคม</div>
            <div class="print-dept">Student Affairs · งานระบบดูแลช่วยเหลือนักเรียนและความปลอดภัยในโรงเรียน</div>
          </div>
        </div>
        <div class="print-doc-title">สรุปแบบฟอร์มขออนุญาตนำโทรศัพท์มาโรงเรียน</div>
        <div class="print-sub">ประจำเดือน ${mName} พ.ศ. ${yearBE} &nbsp;|&nbsp; รวมทั้งหมด ${data.length} รายการ</div>
      </div>
      <table class="print-table">
        <thead>
          <tr>
            <th style="width:30px">#</th>
            <th style="width:90px">วันที่</th>
            <th style="width:120px">ครูที่ปรึกษา</th>
            <th>วัตถุประสงค์</th>
            <th style="width:140px">ช่วงวันที่ใช้งาน</th>
            <th style="width:160px">รายชื่อนักเรียน</th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:#aaa">ไม่พบข้อมูล</td></tr>'}</tbody>
      </table>
      <div class="print-sign-row">
        <div class="sign-box">
          <div class="sign-line"></div>
          <div>ลงชื่อ.............................................ผู้รับผิดชอบ</div>
          <div style="margin-top:4px">วันที่....................................................</div>
        </div>
      </div>
      <div class="print-footer">
        <span>โรงเรียนคลองหาดพิทยาคม | งานระบบดูแลช่วยเหลือนักเรียนและความปลอดภัยในโรงเรียน</span>
        <span>พิมพ์เมื่อ: ${new Date().toLocaleString('th-TH')}</span>
      </div>
    </div>`;
  printReady = true;
}

function doPrint() {
  const month = document.getElementById('filterMonth').value;
  if (!month || !printReady) { alert('กรุณาโหลดข้อมูลก่อนปริ้น'); return; }
  window.print();
}
</script>
</body>
</html>
